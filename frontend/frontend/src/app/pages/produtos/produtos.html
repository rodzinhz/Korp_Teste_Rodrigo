<div class="produtos-container">
  <h2>📦 Cadastro de Produtos</h2>
  
  <section class="form-cadastro">
    <input type="text" [(ngModel)]="codigoNovoProduto" placeholder="Código (ex: PROD-001)">
    <input type="text" [(ngModel)]="nomeNovoProduto" placeholder="Nome do Produto">
    <input type="number" [(ngModel)]="precoNovoProduto" placeholder="Preço Unitário" min="0.01" step="0.01">
    <input type="number" [(ngModel)]="saldoNovoProduto" placeholder="Quantidade em Estoque" min="1">
    <button class="btn-adicionar" (click)="adicionar()">Adicionar Produto</button>
  </section>

  <hr>

  <h2>Lista de Produtos</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Código</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Saldo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (item of listaProdutos; track item.id) {
        <tr>
          <td>{{ item.id }}</td>
          <td>{{ item.codigo }}</td>
          <td>{{ item.descricao }}</td>
          <td>{{ item.preco | currency:'BRL' }}</td>
          <td>{{ item.saldo }}</td>
          <td>
            <button class="btn-delete" (click)="excluirProduto(item.id)">Excluir</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
